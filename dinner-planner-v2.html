<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今夜なに食べる？</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

    :root {
      --primary: #E8722A;
      --primary-light: #F5A06E;
      --primary-dark: #C05818;
      --meat: #C0583A;
      --meat-bg: #FFF0EC;
      --fish: #3A7CA8;
      --fish-bg: #EBF4FB;
      --steam: #6BA8A8;
      --steam-bg: #EBF5F5;
      --bg: #FDF6EC;
      --bg-card: #FFFFFF;
      --text: #3D2B1F;
      --text-light: #7D6055;
      --text-muted: #B09080;
      --border: #EDD9C4;
      --success: #5A9E6F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Zen Maru Gothic', -apple-system, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .app-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      padding: 16px 18px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 14px rgba(0,0,0,.22);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .header-sub {
      font-size: 11px;
      opacity: .82;
      margin-top: 2px;
    }
    .notif-btn {
      background: rgba(255,255,255,.22);
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .notif-btn:active { background: rgba(255,255,255,.35); }
    .notif-btn.active { background: rgba(255,255,255,.4); }

    /* ── NOTIFICATION BANNER ── */
    .notif-setup {
      background: linear-gradient(135deg, #2d7a6a, #1a5f50);
      color: #fff;
      padding: 14px 18px;
      display: none;
    }
    .notif-setup.show { display: block; }
    .notif-setup-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .notif-setup-desc { font-size: 12px; opacity: .85; margin-bottom: 12px; line-height: 1.5; }
    .notif-setup-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .notif-time-input {
      border: 2px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.15);
      color: #fff;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 16px;
      font-family: inherit;
      width: 120px;
    }
    .notif-time-input:focus { outline: none; border-color: rgba(255,255,255,.8); }
    .btn-notif-on {
      background: #fff;
      color: #2d7a6a;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .notif-status {
      font-size: 12px;
      margin-top: 8px;
      opacity: .85;
      min-height: 18px;
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 18px 16px 120px;
    }

    /* ── TODAY TYPE CARD ── */
    .today-card {
      border-radius: 20px;
      padding: 22px 20px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,.10);
    }
    .today-card.meat-card {
      background: linear-gradient(135deg, #fff0ec, #fdddd5);
      border: 2px solid #f0b8a8;
    }
    .today-card.fish-card {
      background: linear-gradient(135deg, #ebf4fb, #d5eaf8);
      border: 2px solid #a8cde8;
    }
    .today-card-emoji {
      font-size: 52px;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .25;
    }
    .today-card-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .6;
      margin-bottom: 4px;
    }
    .today-card-type {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .today-card-type.meat-text { color: var(--meat); }
    .today-card-type.fish-text { color: var(--fish); }

    .toggle-type-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .type-btn {
      flex: 1;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 12px 8px;
      font-size: 20px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      background: rgba(255,255,255,.7);
    }
    .type-btn-label { display: block; font-size: 13px; margin-top: 2px; }
    .type-btn.meat-btn { border-color: var(--meat); color: var(--meat); }
    .type-btn.meat-btn.selected { background: var(--meat); color: #fff; box-shadow: 0 3px 12px rgba(192,88,58,.35); }
    .type-btn.fish-btn { border-color: var(--fish); color: var(--fish); }
    .type-btn.fish-btn.selected { background: var(--fish); color: #fff; box-shadow: 0 3px 12px rgba(58,124,168,.35); }

    /* ── MOOD FILTERS ── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: .06em;
      margin-bottom: 10px;
    }

    .mood-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .mood-chip {
      border: 2px solid var(--border);
      background: var(--bg-card);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      color: var(--text-light);
    }
    .mood-chip.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(232,114,42,.3);
    }

    /* ── STEAM TOGGLE ── */
    .steam-toggle-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .steam-toggle-card.active {
      border-color: var(--steam);
      background: var(--steam-bg);
    }
    .steam-toggle-left { display: flex; align-items: center; gap: 10px; }
    .steam-icon { font-size: 26px; }
    .steam-label { font-size: 14px; font-weight: 700; }
    .steam-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .toggle-switch {
      width: 46px; height: 26px;
      background: #ddd;
      border-radius: 13px;
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .steam-toggle-card.active .toggle-switch { background: var(--steam); }
    .steam-toggle-card.active .toggle-switch::after { transform: translateX(20px); }

    /* ── GENERATE BUTTON ── */
    .generate-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 17px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(232,114,42,.4);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .04em;
      margin-bottom: 22px;
    }
    .generate-btn:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(232,114,42,.3); }
    .generate-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── PROPOSALS ── */
    .proposal-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .proposal-card:nth-child(2) { animation-delay: .07s; }
    .proposal-card:nth-child(3) { animation-delay: .14s; }
    .proposal-card:nth-child(4) { animation-delay: .21s; }
    .proposal-card.selected-card {
      border-color: var(--primary);
      box-shadow: 0 4px 18px rgba(232,114,42,.2);
    }
    .proposal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .proposal-name { font-size: 17px; font-weight: 900; }
    .proposal-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
    .tag {
      font-size: 11px;
      font-weight: 700;
      border-radius: 8px;
      padding: 3px 8px;
    }
    .tag-meat { background: var(--meat-bg); color: var(--meat); }
    .tag-fish { background: var(--fish-bg); color: var(--fish); }
    .tag-steam { background: var(--steam-bg); color: var(--steam); }
    .tag-quick { background: #FFF8E8; color: #C09030; }
    .tag-genre { background: #F0EFF8; color: #6060A0; }
    .score-badge {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border-radius: 10px;
      padding: 5px 10px;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .dish-section {
      border-top: 1px dashed var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }
    .dish-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .dish-emoji { font-size: 20px; flex-shrink: 0; }
    .dish-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .dish-recipe { font-size: 12px; color: var(--text-light); line-height: 1.5; }
    .steam-recipe-badge {
      display: inline-block;
      background: var(--steam-bg);
      color: var(--steam);
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      padding: 1px 6px;
      margin-left: 6px;
    }

    /* ── ADOPT BAR ── */
    .adopt-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #fff;
      border-top: 2px solid var(--border);
      padding: 14px 18px;
      display: none;
      gap: 10px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.12);
    }
    .adopt-bar.show { display: flex; }
    .adopt-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
    }
    .adopt-ok { background: var(--success); color: #fff; }
    .adopt-cancel { background: var(--bg); color: var(--text-light); border: 2px solid var(--border); }

    /* ── HISTORY ── */
    .history-item {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 13px 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .history-date { font-size: 11px; color: var(--text-muted); min-width: 55px; }
    .history-name { font-size: 14px; font-weight: 700; flex: 1; }
    .history-type {
      font-size: 11px; font-weight: 700; border-radius: 8px;
      padding: 3px 9px; flex-shrink: 0;
    }
    .history-type.meat { background: var(--meat-bg); color: var(--meat); }
    .history-type.fish { background: var(--fish-bg); color: var(--fish); }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .eico { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #fff;
      border-top: 1.5px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      border: none;
      background: none;
      padding: 10px 4px 8px;
      font-size: 22px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .nav-btn span { font-size: 10px; color: var(--text-muted); font-family: inherit; font-weight: 700; }
    .nav-btn.active span { color: var(--primary); }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 36px; height: 3px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── LOADER ── */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2d2d2d;
      color: #fff;
      padding: 11px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transition: all .3s;
      z-index: 9999;
      white-space: nowrap;
      max-width: 90vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SETTINGS ── */
    .settings-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .settings-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .settings-label { font-size: 13px; color: var(--text-light); }
    .settings-input {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      width: 120px;
    }
    .btn-sm {
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="header-title">🍽 今夜なに食べる？</div>
      <div class="header-sub" id="headerSub">AIが献立を提案します</div>
    </div>
    <button class="notif-btn" id="notifToggleBtn" onclick="toggleNotifPanel()" title="通知設定">🔔</button>
  </div>
</header>

<!-- 通知設定パネル -->
<div class="notif-setup" id="notifSetup">
  <div class="notif-setup-title">⏰ 毎日の通知設定</div>
  <div class="notif-setup-desc">指定の時刻に「今夜なに食べる？」と通知します。<br>ホーム画面に追加済みの場合のみ届きます。</div>
  <div class="notif-setup-row">
    <input type="time" class="notif-time-input" id="notifTimeInput" value="17:00">
    <button class="btn-notif-on" onclick="enableNotification()">通知をONにする</button>
  </div>
  <div class="notif-status" id="notifStatus"></div>
</div>

<div class="main-content">

  <!-- タブ: 提案 -->
  <div class="tab-panel active" id="tab-suggest">

    <!-- 今日は肉？魚？ -->
    <div class="today-card" id="todayCard">
      <div class="today-card-label">TODAY'S THEME</div>
      <div class="today-card-type" id="todayTypeText">選んでね👇</div>
      <div class="today-card-emoji" id="todayCardEmoji">🍽</div>
      <div class="toggle-type-row">
        <button class="type-btn meat-btn" id="meatBtn" onclick="selectType('meat')">
          🥩<span class="type-btn-label">肉の日</span>
        </button>
        <button class="type-btn fish-btn" id="fishBtn" onclick="selectType('fish')">
          🐟<span class="type-btn-label">魚の日</span>
        </button>
      </div>
    </div>

    <!-- 気分 -->
    <div class="section-title">🌤 今日の気分は？（複数OK）</div>
    <div class="mood-row" id="moodRow">
      <button class="mood-chip selected" data-mood="時短" onclick="toggleMood(this)">⚡ 時短</button>
      <button class="mood-chip" data-mood="さっぱり" onclick="toggleMood(this)">🌿 さっぱり</button>
      <button class="mood-chip" data-mood="こってり" onclick="toggleMood(this)">🔥 こってり</button>
      <button class="mood-chip" data-mood="野菜たっぷり" onclick="toggleMood(this)">🥦 野菜多め</button>
      <button class="mood-chip" data-mood="ガッツリ" onclick="toggleMood(this)">💪 ガッツリ</button>
      <button class="mood-chip" data-mood="あっさり和食" onclick="toggleMood(this)">🍵 和食</button>
    </div>

    <!-- 蒸し器トグル -->
    <div class="steam-toggle-card" id="steamToggle" onclick="toggleSteam()">
      <div class="steam-toggle-left">
        <div class="steam-icon">🫕</div>
        <div>
          <div class="steam-label">蒸し器を使いたい</div>
          <div class="steam-desc">蒸し料理を積極的に提案します</div>
        </div>
      </div>
      <div class="toggle-switch" id="steamSwitch"></div>
    </div>

    <!-- 生成ボタン -->
    <button class="generate-btn" id="generateBtn" onclick="generateMenus()">
      ✨ 献立を考えてもらう
    </button>

    <!-- 提案エリア -->
    <div id="proposalArea"></div>
  </div>

  <!-- タブ: 履歴 -->
  <div class="tab-panel" id="tab-history">
    <div id="historyList"></div>
  </div>

  <!-- タブ: 設定 -->
  <div class="tab-panel" id="tab-settings">
    <div class="settings-card">
      <div class="settings-title">⏰ 通知時刻</div>
      <div class="settings-row">
        <span class="settings-label">毎日通知する時刻</span>
        <input type="time" class="settings-input" id="settingsNotifTime" value="17:00">
      </div>
      <button class="btn-sm" onclick="saveNotifTimeSetting()">保存</button>
    </div>
    <div class="settings-card">
      <div class="settings-title">📋 履歴を削除</div>
      <div class="settings-row">
        <span class="settings-label">これまでの献立履歴</span>
        <button class="btn-sm" style="background:#D44B3A;" onclick="clearHistory()">全削除</button>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-title">ℹ️ アプリについて</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.7;">
        毎日の夕食献立をAIが提案するアプリです。<br>
        通知はホーム画面に追加＆通知許可が必要です。<br>
        <br>
        ver 2.0 ✨ 通知・蒸し器・時短対応
      </div>
    </div>
  </div>

</div>

<!-- ボトムナビ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-suggest" onclick="switchTab('suggest',this)">🍽<span>提案</span></button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history',this)">📋<span>履歴</span></button>
  <button class="nav-btn" id="nav-settings" onclick="switchTab('settings',this)">⚙️<span>設定</span></button>
</nav>

<!-- 採用バー -->
<div class="adopt-bar" id="adoptBar">
  <button class="adopt-btn adopt-cancel" onclick="clearSelection()">キャンセル</button>
  <button class="adopt-btn adopt-ok" onclick="adoptMenu()">✅ 今日の献立に決定！</button>
</div>

<div id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const STORE_KEY = 'dinner-planner-v2';
let S = {
  history: [],
  todayType: null, // 'meat' | 'fish' | null
  useSteam: false,
  moods: ['時短'],
  notifTime: '17:00',
  notifEnabled: false,
};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) S = { ...S, ...JSON.parse(raw) };
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch(e) {}
}

// ============================================================
// API
// ============================================================
async function callAPI(messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages,
    })
  });
  if (!res.ok) throw new Error('APIエラー: ' + res.status);
  return res.json();
}

// ============================================================
// UTILS
// ============================================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().split('T')[0]; }
function toast(msg, ms=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

// ============================================================
// INIT
// ============================================================
load();
initUI();
requestNotifPermission();

function initUI() {
  // 蒸し器
  if (S.useSteam) document.getElementById('steamToggle').classList.add('active');

  // 気分チップ
  document.querySelectorAll('.mood-chip').forEach(chip => {
    const mood = chip.dataset.mood;
    if (S.moods.includes(mood)) chip.classList.add('selected');
    else chip.classList.remove('selected');
  });

  // 通知時刻
  document.getElementById('notifTimeInput').value = S.notifTime || '17:00';
  document.getElementById('settingsNotifTime').value = S.notifTime || '17:00';

  // 今日タイプ
  if (S.todayType) applyTodayType(S.todayType, false);

  // 通知スケジュール
  scheduleNotification();
}

// ============================================================
// TYPE SELECT (肉 / 魚)
// ============================================================
function selectType(type) {
  S.todayType = type;
  save();
  applyTodayType(type, true);
}

function applyTodayType(type, animate) {
  const card = document.getElementById('todayCard');
  const typeText = document.getElementById('todayTypeText');
  const emoji = document.getElementById('todayCardEmoji');
  const meatBtn = document.getElementById('meatBtn');
  const fishBtn = document.getElementById('fishBtn');

  card.classList.remove('meat-card','fish-card');
  typeText.classList.remove('meat-text','fish-text');
  meatBtn.classList.remove('selected');
  fishBtn.classList.remove('selected');

  if (type === 'meat') {
    card.classList.add('meat-card');
    typeText.textContent = '🥩 今日は肉の日！';
    typeText.classList.add('meat-text');
    emoji.textContent = '🥩';
    meatBtn.classList.add('selected');
  } else {
    card.classList.add('fish-card');
    typeText.textContent = '🐟 今日は魚の日！';
    typeText.classList.add('fish-text');
    emoji.textContent = '🐟';
    fishBtn.classList.add('selected');
  }
}

// ============================================================
// MOOD
// ============================================================
function toggleMood(btn) {
  const mood = btn.dataset.mood;
  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    S.moods = S.moods.filter(m => m !== mood);
  } else {
    btn.classList.add('selected');
    if (!S.moods.includes(mood)) S.moods.push(mood);
  }
  save();
}

// ============================================================
// STEAM
// ============================================================
function toggleSteam() {
  S.useSteam = !S.useSteam;
  save();
  const card = document.getElementById('steamToggle');
  if (S.useSteam) card.classList.add('active');
  else card.classList.remove('active');
}

// ============================================================
// GENERATE MENU
// ============================================================
let proposals = [];
let selectedIdx = -1;

async function generateMenus() {
  if (!S.todayType) {
    toast('❗ 先に「肉の日」か「魚の日」を選んでね！');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;"></span>考え中…';
  document.getElementById('proposalArea').innerHTML = `<div class="loader"><div class="spinner"></div><div>AIが献立を考えています…</div></div>`;
  document.getElementById('adoptBar').style.display = 'none';
  proposals = []; selectedIdx = -1;

  const typeLabel = S.todayType === 'fish' ? '魚の日（主菜は魚・海鮮料理）' : '肉の日（主菜は肉料理）';
  const moodLabel = S.moods.length ? S.moods.join('・') : 'なんでもOK';
  const steamNote = S.useSteam ? '蒸し器を使ったレシピを積極的に入れること' : '';
  const recentHist = S.history.slice(-5).map(h => `${h.date}:${h.name}`).join('\n') || '（履歴なし）';

  const prompt = `あなたは家庭料理のプロです。以下の条件で今夜の夕飯献立を3案提案してください。

【今日のテーマ】${typeLabel}
【気分・条件】${moodLabel}
【蒸し器】${S.useSteam ? '積極的に使う（蒸し料理を優先提案）' : '使わなくてOK'}
【直近の献立（重複NG）】
${recentHist}

重要な制約：
- 時短を含む場合は調理20分以内のレシピのみ
- 小学生の子どもがいる家庭向け（辛くない・食べやすい）
- 主菜・副菜・汁物の3品セット
${steamNote ? '- ' + steamNote : ''}

以下のJSON形式のみで返答してください（他のテキスト一切不要）：
{"proposals":[{"name":"献立セット名","type":"fish|meat","genre":"和食|洋食|中華|韓国料理|その他","isSteam":true|false,"isQuick":true|false,"score":85,"main":{"name":"主菜名","recipe":"作り方1〜2文","isSteam":false},"side":{"name":"副菜名","recipe":"作り方1〜2文","isSteam":false},"soup":{"name":"汁物名","recipe":"作り方1〜2文","isSteam":false}}]}

isSteam:true は蒸し器を使う料理につけること。isQuick:true は20分以内の料理につけること。`;

  try {
    const res = await callAPI([{ role:'user', content: prompt }]);
    const text = res.content[0].text.trim();
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('レスポンスの形式が正しくありませんでした');
    const parsed = JSON.parse(m[0]);
    proposals = parsed.proposals || [];
    if (!proposals.length) throw new Error('提案が返ってきませんでした');
    renderProposals();
  } catch(e) {
    document.getElementById('proposalArea').innerHTML = `<div class="empty-state"><div class="eico">😵</div><p>エラーが発生しました<br>${e.message}</p></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 献立を考えてもらう';
  }
}

function renderProposals() {
  const area = document.getElementById('proposalArea');
  area.innerHTML = proposals.map((p, i) => {
    const typeTag = p.type === 'fish'
      ? `<span class="tag tag-fish">🐟 魚</span>`
      : `<span class="tag tag-meat">🥩 肉</span>`;
    const steamTag = p.isSteam ? `<span class="tag tag-steam">🫕 蒸し器</span>` : '';
    const quickTag = p.isQuick ? `<span class="tag tag-quick">⚡ 時短</span>` : '';
    const genreTag = `<span class="tag tag-genre">${p.genre}</span>`;

    const dishRow = (icon, dish) => {
      if (!dish) return '';
      const steamBadge = dish.isSteam ? `<span class="steam-recipe-badge">🫕 蒸し器</span>` : '';
      return `<div class="dish-row">
        <div class="dish-emoji">${icon}</div>
        <div>
          <div class="dish-name">${esc(dish.name)}${steamBadge}</div>
          <div class="dish-recipe">${esc(dish.recipe)}</div>
        </div>
      </div>`;
    };

    return `<div class="proposal-card" id="pc_${i}" onclick="selectProposal(${i})">
      <div class="proposal-header">
        <div>
          <div class="proposal-name">${esc(p.name)}</div>
          <div class="proposal-tags">${typeTag}${steamTag}${quickTag}${genreTag}</div>
        </div>
        <div class="score-badge">${p.score || '—'}</div>
      </div>
      <div class="dish-section">
        ${dishRow('🍳', p.main)}
        ${dishRow('🥗', p.side)}
        ${dishRow('🍜', p.soup)}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectProposal(i) {
  document.querySelectorAll('.proposal-card').forEach(c => c.classList.remove('selected-card'));
  document.getElementById(`pc_${i}`)?.classList.add('selected-card');
  selectedIdx = i;
  document.getElementById('adoptBar').style.display = 'flex';
}

function clearSelection() {
  document.querySelectorAll('.proposal-card').forEach(c => c.classList.remove('selected-card'));
  selectedIdx = -1;
  document.getElementById('adoptBar').style.display = 'none';
}

function adoptMenu() {
  if (selectedIdx < 0) return;
  const p = proposals[selectedIdx];
  S.history.unshift({ id: uid(), date: today(), name: p.name, type: p.type });
  if (S.history.length > 60) S.history = S.history.slice(0, 60);
  S.todayType = null; // 翌日はリセット
  save();
  clearSelection();
  document.getElementById('proposalArea').innerHTML = '';
  applyReset();
  toast(`✅ 「${p.name}」を今日の献立に記録したよ！`);
}

function applyReset() {
  const card = document.getElementById('todayCard');
  card.classList.remove('meat-card','fish-card');
  document.getElementById('todayTypeText').textContent = '選んでね👇';
  document.getElementById('todayTypeText').classList.remove('meat-text','fish-text');
  document.getElementById('todayCardEmoji').textContent = '🍽';
  document.getElementById('meatBtn').classList.remove('selected');
  document.getElementById('fishBtn').classList.remove('selected');
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!S.history.length) {
    el.innerHTML = `<div class="empty-state"><div class="eico">📋</div><p>まだ履歴がありません<br>献立を決定すると記録されます</p></div>`;
    return;
  }
  el.innerHTML = S.history.map(h => {
    const typeCls = h.type === 'fish' ? 'fish' : 'meat';
    const typeLabel = h.type === 'fish' ? '🐟 魚' : '🥩 肉';
    return `<div class="history-item">
      <div class="history-date">${h.date}</div>
      <div class="history-name">${esc(h.name)}</div>
      <div class="history-type ${typeCls}">${typeLabel}</div>
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('履歴をすべて削除しますか？')) return;
  S.history = [];
  save();
  renderHistory();
  toast('🗑️ 履歴を削除しました');
}

// ============================================================
// TAB
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'history') renderHistory();
}

// ============================================================
// NOTIFICATION
// ============================================================
function toggleNotifPanel() {
  const panel = document.getElementById('notifSetup');
  panel.classList.toggle('show');
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  // 既に許可済みかチェックだけ
  updateNotifStatus();
}

function updateNotifStatus() {
  const statusEl = document.getElementById('notifStatus');
  if (!('Notification' in window)) {
    statusEl.textContent = '⚠️ このブラウザは通知に対応していません';
    return;
  }
  if (Notification.permission === 'granted') {
    statusEl.textContent = `✅ 通知ON（毎日 ${S.notifTime} に届きます）`;
    document.getElementById('notifToggleBtn').classList.add('active');
  } else if (Notification.permission === 'denied') {
    statusEl.textContent = '🚫 通知がブロックされています（スマホの設定から許可してください）';
  } else {
    statusEl.textContent = '「通知をONにする」ボタンを押して許可してください';
  }
}

async function enableNotification() {
  if (!('Notification' in window)) {
    toast('⚠️ このブラウザは通知非対応です');
    return;
  }
  const time = document.getElementById('notifTimeInput').value;
  S.notifTime = time;
  save();

  const permission = await Notification.requestPermission();
  if (permission === 'granted') {
    scheduleNotification();
    updateNotifStatus();
    toast(`🔔 通知をONにしたよ！毎日${time}に届きます`);
  } else {
    toast('🚫 通知が許可されませんでした');
    updateNotifStatus();
  }
}

function scheduleNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  // 既存タイマークリア
  if (window._notifTimer) clearTimeout(window._notifTimer);

  const [h, m] = (S.notifTime || '17:00').split(':').map(Number);
  const now = new Date();
  const next = new Date();
  next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1); // 次の日

  const ms = next - now;

  window._notifTimer = setTimeout(() => {
    const type = S.todayType;
    const typeMsg = type === 'meat' ? '🥩 今日は肉の日！' : type === 'fish' ? '🐟 今日は魚の日！' : '🍽 今夜の献立、決まった？';
    new Notification('今夜なに食べる？', {
      body: `${typeMsg}\nアプリを開いてAIに献立を提案してもらおう✨`,
      icon: '🍽',
    });
    // 翌日もスケジュール
    scheduleNotification();
  }, ms);
}

function saveNotifTimeSetting() {
  const time = document.getElementById('settingsNotifTime').value;
  S.notifTime = time;
  save();
  document.getElementById('notifTimeInput').value = time;
  scheduleNotification();
  updateNotifStatus();
  toast(`⏰ 通知時刻を ${time} に変更したよ！`);
}
</script>
